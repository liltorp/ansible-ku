- name: elementer til am servere
  hosts: test_id_servers
  become: true
  pre_tasks:
  - name: Enable codeready-builder repo
    command: >
      subscription-manager repos --enable codeready-builder-for-rhel-8-x86_64-rpms
    register: codeready_repo_result
    changed_when: "'enabled' in codeready_repo_result.stdout"
    failed_when: codeready_repo_result.rc != 0 and 'is already enabled' not in codeready_repo_result.stdout

  - name: Clean yum metadata
    command: yum clean all

  - name: Refresh yum metadata
    command: yum makecache

  - name: Run yum update on all servers to ensure they are up to date
    yum:
      name: '*'
      state: latest

# ---- ID servers: porte + IGMP + multicast rich-rule ----
- hosts: test_id_servers
  become: true
  collections:
    - ansible.posix

  tasks:
  - name: firewall rules for id servers (ports)
    ansible.posix.firewalld:
      zone: public
      port: "{{ item }}"
      state: enabled
      permanent: true
      immediate: true
    loop:
      - 22/tcp
      - 443/tcp
      - 524/tcp
      - 1443/tcp
      - 7801/tcp
      - 8443/tcp
      - 9968/tcp

  - name: Allow IGMP protocol in public zone (for multicast group joins)
    ansible.posix.firewalld:
      zone: public
      protocol: igmp
      state: enabled
      permanent: true
      immediate: true

  - name: Allow UDP multicast to 224.0.0.75:7801 (rich rule)
    ansible.posix.firewalld:
      zone: public
      rich_rule: 'rule family="ipv4" destination address="224.0.0.75/32" port port="7801" protocol="udp" accept'
      state: enabled
      permanent: true
      immediate: true

  # --- External forward via rich rules ---
  - name: Forward port 80 -> 8080 (tcp)
    ansible.posix.firewalld:
      zone: public
      rich_rule: 'rule family="ipv4" forward-port port="80" protocol="tcp" to-port="8080"'
      state: enabled
      permanent: yes
      immediate: yes

  - name: Forward port 443 -> 8443 (tcp)
    ansible.posix.firewalld:
      zone: public
      rich_rule: 'rule family="ipv4" forward-port port="443" protocol="tcp" to-port="8443"'
      state: enabled
      permanent: yes
      immediate: yes

  # --- LOCAL DNAT OUTPUT (dynamic per server IP) ---
  - name: Add DNAT OUTPUT direct rules based on host IP
    ansible.posix.firewalld:
      direct_rule: "{{ item }}"
      state: enabled
      permanent: yes
      immediate: yes
    loop:
      - "ipv4 nat OUTPUT 0 -p tcp -d {{ ansible_default_ipv4.address }} --dport 443 -j DNAT --to-destination {{ ansible_default_ipv4.address }}:8443"
      - "ipv4 nat OUTPUT 0 -p tcp -d {{ ansible_default_ipv4.address }} --dport 80  -j DNAT --to-destination {{ ansible_default_ipv4.address }}:8080"

